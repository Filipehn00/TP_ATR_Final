# Mosquitto Configuration File
# ============================

# Listen on all interfaces, port 1883 (default MQTT)
listener 1883
protocol mqtt

# Also allow WebSocket connections
listener 9001
protocol websockets

# Allow anonymous connections (para desenvolvimento/testes)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true
